<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawit Tycoon 2045</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <button class="btn-back">← KEMBALI</button>
            <div class="eco-score">🌿 Eco-Score: <span id="eco-val">95</span></div>
        </div>

        <div class="main-content">
            <h1 class="game-title">🌴 SAWIT TYCOON 2045</h1>
            <p class="game-subtitle">Klaim Kotak Angpao Digital Anda</p>

            <div class="redeem-box">
                <input type="text" id="redeem-input" placeholder="MASUKKAN KODE DI SINI">
                <button id="btn-claim">KLAIM HADIAH</button>
            </div>

            <div id="notification-message" class="message"></div>
        </div>

        <div class="inventory-section">
            <div class="inventory-title">
                <span>🎒 INVENTORI ANDA</span>
                <span id="inv-count" style="color: #00ff66;">(0)</span>
            </div>
            <ul id="inventory-list" class="inventory-list">
                <li class="inventory-empty">Belum ada item hadiah yang diklaim.</li>
            </ul>
        </div>

        <div class="game-footer">
            <h3>Aturan Klaim:</h3>
            <ul>
                <li>Satu kode hanya berlaku untuk 1 akun pemain.</li>
                <li>Sistem proteksi cooldown aktif untuk mencegah spam klik.</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
